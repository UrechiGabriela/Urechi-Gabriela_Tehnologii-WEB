<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Setări Preferințe</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Setări Preferințe</h1>
        <form id="preferencesForm">
            <label for="username">Nume utilizator</label>
            <input type="text" id="username" name="username" placeholder="Introdu numele" />

            <label for="theme">Tema</label>
            <select id="theme" name="theme">
                <option value="light">Luminos</option>
                <option value="dark">Întunecat</option>
            </select>

            <label for="language">Limba</label>
            <select id="language" name="language">
                <option value="ro">Română</option>
                <option value="en">English</option>
                <option value="fr">Français</option>
            </select>

            <label for="fontSize">Dimensiune font</label>
            <select id="fontSize" name="fontSize">
                <option value="14px">14px</option>
                <option value="16px">16px</option>
                <option value="18px">18px</option>
                <option value="20px">20px</option>
            </select>
            <button type="submit">Salvează preferințele</button>
        </form>
        <div id="messageBox"></div>
    </div>

<script src="js/cookies.js"></script>
<script src="js/storage.js"></script>
<script src="js/preferences.js"></script>

</body>
</html>
