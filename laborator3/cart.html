<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coș de Cumpărături</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Coș de Cumpărături</h1>
        <p><a href="dashboard.html">Înapoi la Dashboard</a></p>
        <div id="messageBox"></div>

        <form id="addToCartForm">
            <label for="product">Produs</label>
            <select id="product" name="product"></select>

            <label for="quantity">Cantitate (1-10)</label>
            <input type="number" id="quantity" name="quantity" min="1" max="10" value="1" required />

            <button type="submit">Adaugă în Coș</button>
        </form>

        <h2>Produse în coș</h2>
        <table id="cartTable">
            <thead>
                <tr>
                    <th>Produs</th>
                    <th>Cantitate</th>
                    <th>Preț</th>
                    <th>Acțiune</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <p><strong>TOTAL:</strong> <span id="cartTotal">0</span> RON</p>

        <button id="clearCartBtn" class="btn-danger">Golește Coșul</button>
    </div>
    <script src="js/cookies.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
