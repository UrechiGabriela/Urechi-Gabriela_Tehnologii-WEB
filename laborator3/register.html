<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Înregistrare</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Înregistrare</h1>

        <div id="messageBox"></div>

        <form id="registerForm" novalidate>
            <label for="username">Username (minim 3 caractere)</label>
            <input type="text" id="username" name="username" minlength="3" required />

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />

            <label for="password">Parolă (minim 6 caractere)</label>
            <input type="password" id="password" name="password" minlength="6" required />

            <label for="confirmPassword">Confirmare parolă</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required />

            <button type="submit">Creează cont</button>
        </form>

        <p>Ai deja cont? <a href="login.html">Mergi la login</a></p>
    </div>

<script src="js/storage.js"></script>
<script src="js/register.js"></script>

</body>
</html>
